<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR Scan</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h2 id="booth"></h2>
  <div id="reader" style="width:300px; margin:auto;"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const booth = params.get("booth") || "unknown";

    document.getElementById("booth").innerText = "Booth: " + booth;

    let lastScan = "";

    function onScanSuccess(decodedText) {
      if (decodedText === lastScan) return;
      lastScan = decodedText;

      fetch("https://script.google.com/macros/s/AKfycbw6PYeW7v7atYI-ZM9hlbmzSkUa5tjhH3iLusCMkywFYLQlW3PrIa9CQQ9YkLegle5iZw/exec", {
        method: "POST",
        body: JSON.stringify({
          booth: booth,
          user_id: decodedText
        })
      });

      alert("記録しました: " + decodedText);
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10 },
      onScanSuccess
    );
  </script>

</body>
</html>
